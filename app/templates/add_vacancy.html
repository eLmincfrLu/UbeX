{% extends "base.html" %}
{% block title %}Post vacancy{% endblock %}
{% block sidebar_nav %}
<a href="{{ url_for('partner.dashboard') }}">Dashboard</a>
<a href="{{ url_for('vacancy.add_vacancy') }}" class="active">Post vacancy</a>
{% endblock %}
{% block content %}
<header class="page-header"><h1>Post vacancy</h1></header>
<form method="post" class="panel form-panel">
  <label>Job title<input type="text" name="title" required></label>
  <label>Company<input type="text" name="company_name" placeholder="TechCorp"></label>
  <label>Location<input type="text" name="location" placeholder="Baku"></label>
  <label>Employment type<input type="text" name="employment_type" value="Full-time"></label>
  <label>Required skills (comma-separated)<input type="text" name="required_skills" placeholder="Python, SQL, Data Analysis"></label>
  <label>Minimum GPA<input type="number" step="0.1" name="min_gpa" value="3.0"></label>
  <label>Description<textarea name="description" rows="5" required></textarea></label>
  <button type="submit" class="btn btn-primary">Publish & run semantic matching</button>
</form>
{% endblock %}
