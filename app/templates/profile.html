{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block sidebar_nav %}
<a href="{{ url_for('student.dashboard') }}">Dashboard</a>
<a href="{{ url_for('student.profile') }}" class="active">Profile</a>
{% endblock %}
{% block content %}
<header class="page-header"><h1>Profile</h1></header>
<form method="post" class="panel form-panel">
  <label>Full name<input type="text" name="full_name" value="{{ user.full_name }}"></label>
  <label>Department<input type="text" name="department" value="{{ user.department or '' }}"></label>
  <label>Bio<textarea name="bio" rows="4">{{ user.bio or '' }}</textarea></label>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
